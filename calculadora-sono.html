<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Sono</title>
<script>
(function(){
  const c=document.createElement('canvas');c.width=180;c.height=180;
  const ctx=c.getContext('2d');
  // Background
  const bg=ctx.createRadialGradient(90,90,0,90,90,90);
  bg.addColorStop(0,'#1B1E35');bg.addColorStop(1,'#0D0F1A');
  ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(0,0,180,180,36);ctx.fill();
  // Star
  ctx.save();ctx.translate(90,90);
  ctx.fillStyle='#FFD580';ctx.shadowColor='rgba(255,213,128,0.8)';ctx.shadowBlur=18;
  ctx.beginPath();
  const spikes=5,outer=58,inner=24;
  for(let i=0;i<spikes*2;i++){
    const r=i%2===0?outer:inner;
    const a=(i*Math.PI/spikes)-Math.PI/2;
    i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();ctx.fill();
  // Small stars
  ctx.shadowBlur=6;ctx.fillStyle='rgba(255,213,128,0.5)';
  [[−38,−42,5],[40,−38,4],[−42,36,3],[44,40,4]].forEach(([x,y,r])=>{
    ctx.beginPath();
    for(let i=0;i<10;i++){
      const ro=i%2===0?r:r*0.45;
      const a=(i*Math.PI/5)-Math.PI/2;
      i===0?ctx.moveTo(x+Math.cos(a)*ro,y+Math.sin(a)*ro):ctx.lineTo(x+Math.cos(a)*ro,y+Math.sin(a)*ro);
    }
    ctx.closePath();ctx.fill();
  });
  ctx.restore();
  const link=document.createElement('link');
  link.rel='apple-touch-icon';link.href=c.toDataURL('image/png');
  document.head.appendChild(link);
})();
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0D0F1A;
    --surface: #151829;
    --card: #1B1E35;
    --border: #2A2D4A;
    --accent: #7C6AF7;
    --accent-soft: #A99CF7;
    --moon: #FFD580;
    --moon-glow: rgba(255, 213, 128, 0.18);
    --text: #E8E4F8;
    --muted: #7A7A9D;
    --green: #5CE8B5;
    --pink: #F087C3;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Stars background */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle var(--dur) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; }
    50% { opacity: var(--max-op); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 540px;
  }

  /* Moon */
  .moon-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 24px;
  }
  .moon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff5c0, var(--moon) 60%, #c89a2e);
    box-shadow: 0 0 40px var(--moon-glow), 0 0 80px rgba(255,213,128,0.08);
    animation: float 6s ease-in-out infinite;
    position: relative;
    flex-shrink: 0;
  }
  .moon::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: rgba(0,0,0,0.12);
    border-radius: 50%;
    top: 20px; left: 44px;
    box-shadow: -8px 12px 0 rgba(0,0,0,0.08), -18px 5px 0 rgba(0,0,0,0.06);
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    text-align: center;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 6px;
  }
  h1 em {
    font-style: italic;
    color: var(--accent-soft);
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.875rem;
    font-weight: 300;
    letter-spacing: 0.02em;
    margin-bottom: 36px;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    margin-bottom: 20px;
  }

  .card-label {
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent-soft);
    margin-bottom: 14px;
  }

  /* Mode toggle */
  .mode-toggle {
    display: flex;
    background: var(--surface);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
    margin-bottom: 22px;
  }
  .mode-btn {
    flex: 1;
    padding: 9px 12px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--accent);
    color: white;
    box-shadow: 0 2px 12px rgba(124, 106, 247, 0.4);
  }

  /* Time input */
  .time-group {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    transition: border-color 0.2s;
  }
  .time-group:focus-within {
    border-color: var(--accent);
  }
  .time-icon {
    font-size: 1.3rem;
    flex-shrink: 0;
  }
  .time-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 1.6rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    width: 100%;
  }
  .time-input::-webkit-calendar-picker-indicator {
    filter: invert(0.6) sepia(1) saturate(3) hue-rotate(220deg);
    cursor: pointer;
  }

  /* Cycles */
  .cycles-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  .cycle-chip {
    padding: 6px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 0.78rem;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .cycle-chip.active {
    border-color: var(--accent);
    color: var(--accent-soft);
    background: rgba(124,106,247,0.12);
  }

  /* Calc button */
  .calc-btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(124,106,247,0.3);
  }
  .calc-btn:hover {
    background: #6a58e8;
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(124,106,247,0.4);
  }
  .calc-btn:active { transform: translateY(0); }

  /* Results */
  .results {
    display: none;
    animation: fadeUp 0.4s ease;
  }
  .results.visible { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .results-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.1rem;
    color: var(--text);
    margin-bottom: 14px;
  }

  .result-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .result-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    transition: border-color 0.2s;
  }
  .result-item:hover { border-color: var(--accent); }

  .result-left { display: flex; align-items: center; gap: 12px; }

  .result-cycles {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 32px;
  }
  .cycle-dots {
    display: flex;
    gap: 3px;
  }
  .cycle-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
  }
  .cycle-dot.filled { background: var(--accent); }

  .result-info {}
  .result-time {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
  }
  .result-duration {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 2px;
  }

  .result-quality {
    font-size: 0.75rem;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 999px;
  }
  .quality-good { background: rgba(92,232,181,0.12); color: var(--green); }
  .quality-ok { background: rgba(255,213,128,0.12); color: var(--moon); }
  .quality-low { background: rgba(240,135,195,0.12); color: var(--pink); }

  /* Sleep tip */
  .tip {
    margin-top: 20px;
    padding: 16px 18px;
    background: rgba(124,106,247,0.07);
    border: 1px solid rgba(124,106,247,0.2);
    border-radius: 12px;
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.6;
  }
  .tip strong { color: var(--accent-soft); }

  /* Divider label */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0 16px;
    color: var(--muted);
    font-size: 0.75rem;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  @media (max-width: 480px) {
    h1 { font-size: 1.65rem; }
    .time-input { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="moon-wrap">
    <div class="moon"></div>
  </div>

  <h1>Calcule seu <em>sono ideal</em></h1>
  <p class="subtitle">Baseado em ciclos de 90 minutos de sono REM</p>

  <div class="card">
    <p class="card-label">Modo de cálculo</p>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-sleep" onclick="setMode('sleep')">🌙 Quero dormir às...</button>
      <button class="mode-btn" id="btn-wake" onclick="setMode('wake')">☀️ Preciso acordar às...</button>
    </div>

    <p class="card-label" id="input-label">Horário de dormir</p>
    <div class="time-group">
      <span class="time-icon" id="time-icon">🌙</span>
      <input type="time" class="time-input" id="time-input" value="23:00">
    </div>

    <div class="divider">ciclos de sono</div>
    <p class="card-label">Quantidade de ciclos</p>
    <div class="cycles-row" id="cycles-row">
      <button class="cycle-chip" onclick="setCycles(4)">4 ciclos</button>
      <button class="cycle-chip active" onclick="setCycles(5)">5 ciclos</button>
      <button class="cycle-chip" onclick="setCycles(6)">6 ciclos</button>
      <button class="cycle-chip" onclick="setCycles('all')">Ver todos</button>
    </div>
  </div>

  <button class="calc-btn" onclick="calculate()">Calcular horários ideais</button>

  <div class="results card" id="results" style="margin-top:20px;">
    <p class="results-title" id="results-title">Horários recomendados para acordar</p>
    <div class="result-grid" id="result-grid"></div>
    <div class="tip" id="tip-box"></div>
  </div>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px;height:${size}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s;
      --max-op:${0.2+Math.random()*0.7};
      animation-delay:${Math.random()*5}s;
    `;
    starsEl.appendChild(s);
  }

  let mode = 'sleep'; // 'sleep' = I want to sleep at X, 'wake' = I need to wake at X
  let selectedCycles = 5;

  function setMode(m) {
    mode = m;
    document.getElementById('btn-sleep').classList.toggle('active', m === 'sleep');
    document.getElementById('btn-wake').classList.toggle('active', m === 'wake');
    if (m === 'sleep') {
      document.getElementById('input-label').textContent = 'Horário de dormir';
      document.getElementById('time-icon').textContent = '🌙';
    } else {
      document.getElementById('input-label').textContent = 'Horário de acordar';
      document.getElementById('time-icon').textContent = '☀️';
    }
    document.getElementById('results').classList.remove('visible');
  }

  function setCycles(c) {
    selectedCycles = c;
    document.querySelectorAll('.cycle-chip').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  function addMinutes(timeStr, mins) {
    const [h, m] = timeStr.split(':').map(Number);
    const total = h * 60 + m + mins;
    const nh = Math.floor(total / 60) % 24;
    const nm = total % 60;
    return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
  }

  function subtractMinutes(timeStr, mins) {
    const [h, m] = timeStr.split(':').map(Number);
    let total = h * 60 + m - mins;
    if (total < 0) total += 24 * 60;
    const nh = Math.floor(total / 60) % 24;
    const nm = total % 60;
    return `${String(nh).padStart(2,'0')}:${String(nm).padStart(2,'0')}`;
  }

  function formatTime12(t) {
    const [h, m] = t.split(':').map(Number);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return `${h12}:${String(m).padStart(2,'0')} <span style="font-size:0.8rem;color:var(--muted)">${ampm}</span>`;
  }

  function quality(cycles) {
    if (cycles >= 5) return { label: 'Ideal', cls: 'quality-good' };
    if (cycles === 4) return { label: 'Bom', cls: 'quality-ok' };
    return { label: 'Curto', cls: 'quality-low' };
  }

  function calculate() {
    const timeVal = document.getElementById('time-input').value;
    if (!timeVal) return;

    // Fall asleep takes ~14 min on average
    const fallAsleepMins = 14;
    const cycleMins = 90;

    let cyclesToShow = [];
    if (selectedCycles === 'all') {
      cyclesToShow = [3, 4, 5, 6];
    } else {
      // Show the selected ±1
      const c = parseInt(selectedCycles);
      cyclesToShow = [c - 1, c, c + 1].filter(x => x >= 1 && x <= 7);
    }

    const grid = document.getElementById('result-grid');
    grid.innerHTML = '';

    if (mode === 'sleep') {
      // Given sleep time → compute wake times
      document.getElementById('results-title').textContent = 'Melhores horários para acordar';
      cyclesToShow.forEach(c => {
        const totalMins = fallAsleepMins + c * cycleMins;
        const wakeTime = addMinutes(timeVal, totalMins);
        const hrs = Math.floor(totalMins / 60);
        const mins = totalMins % 60;
        const q = quality(c);
        const dotsHtml = [1,2,3,4,5,6].slice(0,6).map(i =>
          `<div class="cycle-dot ${i<=c ? 'filled' : ''}"></div>`).join('');

        grid.innerHTML += `
          <div class="result-item">
            <div class="result-left">
              <div class="result-cycles">
                <div class="cycle-dots">${dotsHtml}</div>
                <span style="font-size:0.65rem;color:var(--muted);margin-top:2px">${c} ciclos</span>
              </div>
              <div class="result-info">
                <div class="result-time">${formatTime12(wakeTime)}</div>
                <div class="result-duration">${hrs}h${mins > 0 ? mins+'min' : ''} de sono</div>
              </div>
            </div>
            <span class="result-quality ${q.cls}">${q.label}</span>
          </div>`;
      });

      document.getElementById('tip-box').innerHTML =
        `<strong>💡 Dica:</strong> Leve em conta que você levará cerca de <strong>14 minutos</strong> para adormecer após deitar — já incluídos nos cálculos acima.`;

    } else {
      // Given wake time → compute sleep times
      document.getElementById('results-title').textContent = 'Melhores horários para dormir';
      cyclesToShow.forEach(c => {
        const totalMins = fallAsleepMins + c * cycleMins;
        const sleepTime = subtractMinutes(timeVal, totalMins);
        const hrs = Math.floor(totalMins / 60);
        const mins = totalMins % 60;
        const q = quality(c);
        const dotsHtml = [1,2,3,4,5,6].slice(0,6).map(i =>
          `<div class="cycle-dot ${i<=c ? 'filled' : ''}"></div>`).join('');

        grid.innerHTML += `
          <div class="result-item">
            <div class="result-left">
              <div class="result-cycles">
                <div class="cycle-dots">${dotsHtml}</div>
                <span style="font-size:0.65rem;color:var(--muted);margin-top:2px">${c} ciclos</span>
              </div>
              <div class="result-info">
                <div class="result-time">${formatTime12(sleepTime)}</div>
                <div class="result-duration">${hrs}h${mins > 0 ? mins+'min' : ''} de sono</div>
              </div>
            </div>
            <span class="result-quality ${q.cls}">${q.label}</span>
          </div>`;
      });

      document.getElementById('tip-box').innerHTML =
        `<strong>💡 Dica:</strong> Esses são os horários para <strong>apagar a luz e fechar os olhos</strong> — já considerando os ~14 min para adormecer.`;
    }

    document.getElementById('results').classList.add('visible');
    setTimeout(() => document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
  }
</script>
</body>
</html>
